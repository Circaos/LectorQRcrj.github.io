    <div class="contenedorInputDAM" id="idContenedorInputDam">
        <h1>INGRESAR DAM V10</h1>
        <form id="formBusqueda" onsubmit="return false;">
            <input type="number" id="inputBusqueda" placeholder="1182610...">
            <button type="submit">Buscar</button>
        </form>
        <h2 id="idMensajeAlertaInputDam"> </h2>
    </div>

    <div class="contenedorInfoDam noView" id="idContenedorInfoDam">
        <div class="tablasInformacion">
            <table id="idTablaCabeceraInfo">
                <tbody></tbody>
            </table>
            <table id="idTablaInfo">
                <tbody></tbody>
            </table>
        </div>

        <div class="menuOpciones">
            <button class="botonFixed" id="idBtnLector">🔎 Buscador</button>

        <div class="container">
            <div class="header">
                <h1>📷 Lector</h1>
                <!-- <p>Soporta múltiples formatos • Alta precisión</p> -->
                <button class="btnScam" id="idBtnAtrasScam">🔙 Atras</button>
            </div>

            <div class="content">
                <div class="scanner-container">
                    <div id="reader"></div>
                    <div class="controls noView">
                        <button id="startBtn">▶ Iniciar Escáner</button>
                        <button id="stopBtn" disabled>⏹ Detener</button>
                    </div>
                </div>

            </div>
            <div class="cajaBotonesRedimensionarScam" id="idContenedorBtnResize">
                <button class="btnScam">1/1</button>
                <button class="btnScam">1/2</button>
                <button class="btnScam">1/3</button>
                <button class="btnScam">1/4</button>
                <button class="btnScam">1/5</button>
            </div>
            <input type="range" id="mi-control-zoom">
            <div id="idResponseScam" class="contenedorResponse noView">
                <h3 id="titleResponseScam"></h3>
                <div id="miniContenedorRPT"></div>
            </div>
            <p id="idTextoInformacion" class="noView"></p>
        </div>
        <div class="menuOpcionesScam">
            <button class="botonFixed noView" id="idBtnVolverScanear">🔎 VOLVER A ESCANEAR</button>
        </div>
